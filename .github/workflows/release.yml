name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Select release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          current="$(git tag --points-at HEAD -l 'v0.1.*' --sort=-v:refname | head -n 1)"
          if [[ -n "$current" ]]; then
            echo "tag=$current" >> "$GITHUB_OUTPUT"
            echo "create=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag -l 'v0.1.*' --sort=-v:refname | head -n 1)"
          if [[ -z "$latest" ]]; then
            next="v0.1.0"
          else
            patch="${latest##*.}"
            next="v0.1.$((patch + 1))"
          fi

          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "create=true" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.tag.outputs.create == 'true'
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
